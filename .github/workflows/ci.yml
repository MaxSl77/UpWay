name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend: lint + types + production build ──────────────────────
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Build
        run: npm run build

  # ── Backend: компиляция, импорт приложения, миграции против pgvector ─
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: upway
          POSTGRES_PASSWORD: upway
          POSTGRES_DB: upway
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U upway"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://upway:upway@localhost:5432/upway
      SECRET_KEY: ci-only-secret-key-0123456789abcdef0123456789abcdef
      ENVIRONMENT: ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile check
        run: python -m compileall -q app alembic

      - name: App imports cleanly
        run: python -c "from app.main import app; print('import ok')"

      - name: Migrations apply (upgrade head)
        run: alembic upgrade head

      - name: Migrations are reversible (downgrade base → upgrade head)
        run: |
          alembic downgrade base
          alembic upgrade head

      # Когда появятся тесты — раскомментировать:
      # - name: Tests
      #   run: pytest -q

  # ── Docker: образы собираются (без публикации) ─────────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: false
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
