user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── Rate limiting ─────────────────────────────────────────
    # api:  общий трафик SPA (дашборд делает 4-6 запросов за заход) —
    #       10 r/s с burst достаточно для активной работы, но режет флуд.
    # auth: логин/регистрация/сброс пароля — строже (брутфорс, спам письмами).
    #       Поверх этого работают лимиты slowapi в самом приложении.
    limit_req_zone $binary_remote_addr zone=api:10m  rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=30r/m;
    limit_req_status 429;

    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name upway.app www.upway.app;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # ── Security headers (наследуются location-ами без своих add_header) ──
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options  "nosniff" always;
        add_header X-Frame-Options         "DENY" always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;
        # CSP: SPA same-origin; style 'unsafe-inline' нужен инлайн-стилям React,
        # connect-src включает Sentry ingest; img data: — для иконок/аватаров.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://*.sentry.io https://*.ingest.sentry.io; worker-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

        # ── Auth API (строгий лимит) ──────────────────────────
        location /api/v1/auth/ {
            limit_req zone=auth burst=10 nodelay;

            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── API ───────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=30 nodelay;

            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Долгие ответы AI / отключение буферизации
            proxy_set_header   Connection "";
            proxy_buffering    off;
            proxy_read_timeout 300s;
        }

        # ── Frontend SPA ──────────────────────────────────────
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            # Cache static assets.
            # ВАЖНО: add_header в этом блоке отключает наследование
            # security-заголовков сервера — повторяем их явно.
            location ~* \.(js|css|png|jpg|svg|woff2?)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
                add_header X-Content-Type-Options "nosniff" always;
            }
        }
    }
}
